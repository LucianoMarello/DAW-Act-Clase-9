<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Formulario de Registro</h1>
    <form id="form">
      <fieldset>
        <label for="name"
          >Nombre completo: <input type="text" id="name"
        /></label>

        <p></p>
        <label for="email">Email: <input type="email" id="email" /></label>

        <p></p>
        <label for="password">
          Contraseña: <input type="password" id="password"
        /></label>

        <p></p>
        <label for="confirmPassword">
          Repetir Contraseña: <input type="password" id="confirmPassword"
        /></label>

        <p></p>
        <label for="age">Edad: <input type="number" id="age" /></label>

        <p></p>
        <label for="tel">Teléfono: <input type="number" id="tel" /></label>

        <p></p>
        <label for="direction"
          >Dirección: <input type="text" id="direction"
        /></label>

        <p></p>
        <label for="city">Ciudad: <input type="text" id="city" /></label>
        <p></p>
        <label for="codigoPostal"
          >Código Postal: <input type="text" id="codigoPostal"
        /></label>

        <p></p>
        <label for="DNI">DNI: <input type="text" id="DNI" /></label>
        <p></p>

        <button type="submit">Enviar Formulario</button>
        <button type="reset">Resetear</button>
      </fieldset>
    </form>

    <script src="script.js"></script>
  </body>
</html>
